# OpenCut v3 CI（v0.7.0，port 自 v0.5.4 audit + 适配）
# 4 个 job：test 矩阵 / 稳定性 / Remotion 类型检查 / health 端点冒烟
name: CI

on:
  push:
    branches: [main, "v0.6.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    env:
      PYTHONUTF8: "1"
      OPENCUT_FORCED_ALIGN: "0"   # CI 不下 1.2GB 模型
      OPENCUT_TRIM_SILENCE: "0"
      OPENCUT_FACE_MASK: "0"
      OPENCUT_DOMAIN_CACHE_TTL: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Test
        # 跳过稳定性套件（单独 job 跑）+ 3 个慢/重 e2e
        run: |
          pytest --ignore=tests/test_c07_stability.py \
            --deselect tests/test_e2e_full_pipeline.py \
            --deselect tests/test_v2_chain_fixes.py \
            --deselect tests/test_v2_selfcheck.py \
            --cov=src --cov-report=term-missing
      - name: Coverage (3.12 only, non-blocking)
        if: matrix.python-version == '3.12'
        run: |
          pip install pytest-cov
          pytest --ignore=tests/test_c07_stability.py --cov=src --cov-report=xml || true

  test-7-stability:
    runs-on: ubuntu-latest
    needs: test
    env:
      PYTHONUTF8: "1"
      OPENCUT_FORCED_ALIGN: "0"
      OPENCUT_TRIM_SILENCE: "0"
      OPENCUT_DOMAIN_CACHE_TTL: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Stability suite
        run: pytest tests/test_c07_stability.py -v

  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Remotion deps
        run: cd remotion && npm install
      - name: TypeScript check
        run: cd remotion && npx tsc --noEmit

  health:
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: "1"
      OPENCUT_DATA_DIR: /tmp/opencut_health
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install app
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Smoke test health endpoints
        run: |
          python - <<'EOF'
          from fastapi.testclient import TestClient
          from src.api.app import app
          with TestClient(app) as client:
              r = client.get("/health")
              assert r.status_code == 200, r.text
              assert r.json()["status"] == "ok"
              rr = client.get("/health/ready")
              assert rr.status_code in (200, 503), rr.text
              rd = client.get("/health/detail")
              assert rd.status_code == 200, rd.text
              # 不泄漏绝对路径
              body = str(rd.json())
              assert "/tmp/" not in body and "/home/" not in body, "path leak: " + body
          print("health smoke OK")
          EOF
