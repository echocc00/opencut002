pipeline:
  name: default
  stages:
    - name: material_analysis
      type: auto
      skill: material_analysis
      requires: []
    - name: web_research
      type: auto
      skill: web_research
      requires: [material_analysis]
    - name: topic
      type: decision
      skill: topic
      requires: [material_analysis, web_research]
    - name: highlight_selection
      type: decision
      skill: highlight
      requires: [topic]
    - name: copywriting
      type: decision
      skill: copywriting
      requires: [topic, highlight_selection]
    - name: image_matching
      type: auto
      skill: image_matching
      requires: [copywriting, material_analysis]
    - name: voice_selection
      type: decision
      skill: voice
      requires: [copywriting]
    - name: tts
      type: auto
      skill: tts
      requires: [copywriting, voice_selection]
    - name: storyboard
      type: decision
      skill: storyboard
      requires: [copywriting, image_matching, tts]
    - name: opening_review
      type: quality_gate
      skill: opening_review
      requires: [storyboard]
    - name: slideshow_check
      type: quality_gate_auto
      requires: [storyboard]
    - name: bgm
      type: decision
      skill: bgm
      requires: [storyboard]
    - name: rhythm
      type: auto
      skill: rhythm
      requires: [storyboard, bgm]
    - name: title
      type: decision
      skill: title
      requires: [copywriting]
    - name: cover
      type: decision
      skill: cover
      requires: [storyboard]
    - name: fine_cut
      type: auto
      skill: fine_cut
      requires: [storyboard, rhythm]
    - name: pre_render_check
      type: quality_gate_auto
      requires: [fine_cut]
    - name: render
      type: auto
      skill: render
      requires: [fine_cut, tts, bgm]
    - name: post_render_check
      type: quality_gate_auto
      requires: [render]
    - name: deliver
      type: manual
      requires: [post_render_check]
